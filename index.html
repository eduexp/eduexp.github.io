<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>My Site</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    .bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 10px;
      background: rgba(0,0,0,.6);
      color: #fff;
      z-index: 10;
      backdrop-filter: blur(10px);
    }
    .bar a {
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,.25);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 14px;
    }
    iframe {
      position: absolute;
      top: 44px;
      left: 0;
      width: 100%;
      height: calc(100% - 44px);
      border: 0;
      background: #fff;
    }
    .msg {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      text-align: center;
      padding: 24px;
      color: #fff;
      background: #111;
    }
    .msg code {
      display: inline-block;
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #222;
      color: #9ef;
      text-align: left;
      max-width: 820px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div class="bar">
    <div style="font-weight:600;">My Site</div>
    <div style="flex:1;"></div>
    <a id="openNew" href="#" target="_blank" rel="noopener">Open in new tab</a>
  </div>

  <!-- CHANGE THIS URL -->
  <iframe id="frame" src="https://itzyou.com/experiment/" referrerpolicy="no-referrer"></iframe>

  <div id="blocked" class="msg">
    <div>
      <h2>Embedding blocked by the website</h2>
      <p>
        This site refuses to load inside an iframe (security header like
        <b>X-Frame-Options</b> or <b>Content-Security-Policy</b>).
      </p>
      <p>Open it directly instead:</p>
      <code id="urlText"></code>
      <p style="margin-top:16px;">
        <a id="openNew2" href="#" target="_blank" rel="noopener"
           style="color:#fff;border:1px solid rgba(255,255,255,.25);padding:10px 12px;border-radius:12px;text-decoration:none;">
          Open in new tab
        </a>
      </p>
    </div>
  </div>

  <script>
    // CHANGE THIS URL
    const TARGET_URL = "https://example.com";

    const frame = document.getElementById("frame");
    const openNew = document.getElementById("openNew");
    const openNew2 = document.getElementById("openNew2");
    const urlText = document.getElementById("urlText");
    const blocked = document.getElementById("blocked");

    frame.src = TARGET_URL;
    openNew.href = TARGET_URL;
    openNew2.href = TARGET_URL;
    urlText.textContent = TARGET_URL;

    // If the iframe is blocked, many browsers will keep it blank.
    // We'll show a fallback message after a short delay.
    setTimeout(() => {
      try {
        // Accessing iframe document may throw if cross-origin (normal),
        // but if it's blocked, it often remains about:blank or inaccessible.
        const src = frame.contentWindow.location.href;
        // If we got here without error and it's not blank, assume it loaded.
        if (src && src !== "about:blank") return;
      } catch (e) {
        // Cross-origin error does NOT mean blocked. So we don't conclude from this.
        // We'll detect "blocked" only by checking if iframe is still blank-ish after time.
      }

      // Heuristic: if still blank after delay, show fallback.
      // (Not perfect, but works for many blocked cases.)
      blocked.style.display = "grid";
    }, 2500);
  </script>
</body>
</html>
